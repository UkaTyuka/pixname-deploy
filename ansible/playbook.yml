---
- name: Provision VM and deploy PixName
  hosts: all
  become: true

  vars:
    # Where we will clone the repo on the target VM
    project_dir: /opt/pixname

    # Where docker-compose.yml is located inside your repo
    compose_dir: /opt/pixname/Infrastructure

    # Compose project name (-p)
    compose_project: infrastructure

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites + Docker (from Ubuntu repo)
      apt:
        name:
          - ca-certificates
          - curl
          - git
          - docker.io
          - docker-compose
        state: present
        update_cache: yes

    - name: Ensure docker service started
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create project dir
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: "0755"

    - name: Checkout repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: "{{ repo_branch }}"
        force: yes

    - name: Ensure compose dir exists
      stat:
        path: "{{ compose_dir }}"
      register: compose_dir_stat

    - name: Fail if compose dir not found
      fail:
        msg: "compose_dir {{ compose_dir }} not found. Check repo structure / path to docker-compose.yml"
      when: not compose_dir_stat.stat.exists

    
    - name: Write env file for compose
      copy:
        dest: "{{ compose_dir }}/.env"
        mode: "0600"
        content: |
          BOT_TOKEN={{ lookup('env','BOT_TOKEN') | default('', true) }}
          DB_USER={{ lookup('env','DB_USER') | default('pixname', true) }}
          DB_PASSWORD={{ lookup('env','DB_PASSWORD') | default('pixnamepass', true) }}
          DB_NAME={{ lookup('env','DB_NAME') | default('pixname', true) }}
          DB_HOST={{ lookup('env','DB_HOST') | default('db', true) }}

    - name: Compose down (safe)
      shell: |
        set -eux
        cd "{{ compose_dir }}"
        docker-compose -p "{{ compose_project }}" down || true
    
    - name: Create external docker volume if not exists
      shell: |
        docker volume inspect pixname_pgdata >/dev/null 2>&1 || \
        docker volume create pixname_pgdata
    
    - name: Compose up
      shell: |
        set -eux
        cd "{{ compose_dir }}"
        docker-compose -p "{{ compose_project }}" up -d --build

    # Универсальная проверка без HTTP healthcheck:
    # просто убеждаемся, что docker-compose видит сервисы и они в состоянии Up
    - name: Check compose services are Up
      shell: |
        set -eux
        cd "{{ compose_dir }}"
        docker-compose -p "{{ compose_project }}" ps
        docker-compose -p "{{ compose_project }}" ps --services
      register: compose_ps

    - name: Show compose status
      debug:
        var: compose_ps.stdout_lines
